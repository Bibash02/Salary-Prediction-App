<!DOCTYPE html>
<html>
<head>
    <title>Salary Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 20px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Salary Prediction App</h1>

    <form action="/predict" method="POST">

    <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" required>
    </div>

    <div class="form-group">
        <label>Years of Experience</label>
        <input type="number" step="0.1" name="experience" required>
    </div>

    <div class="form-group">
        <label>Gender</label>
        <select name="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
    </div>

    <div class="form-group">
        <label>Education Level</label>
        <select name="education" required>
            <option value="Bachelor's">Bachelor's</option>
            <option value="Master's">Master's</option>
            <option value="PhD">PhD</option>
        </select>
    </div>

    <div class="form-group">
        <label>Job Title</label>
        <select name="job_title" required>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Data Scientist">Data Scientist</option>
            <option value="Senior Manager">Senior Manager</option>
            <option value="Director">Director</option>
            <option value="Marketing Coordinator">Marketing Coordinator</option>
            <option value="HR Manager">HR Manager</option>
            <option value="Operations Manager">Operations Manager</option>
            <option value="Marketing Manager">Marketing Manager</option>
            <option value="Sales Director">Sales Director</option>
            <option value="Business Analyst">Business Analyst</option>
            <option value="VP of Operations">VP of Operations</option>
            <option value="IT Support">IT Support</option>
            <option value="Recruiter">Recruiter</option>
            <option value="Financial Manager">Financial Manager</option>
            <option value="Social Media Specialist">Social Media Specialist</option>
            <option value="CEO">CEO</option>
            <option value="Junior Developer">Junior Developer</option>
            <option value="Product Designer">Product Designer</option>
            <option value="Accountant">Accountant</option>
        </select>
    </div>

    <button type="submit">Predict Salary</button>

</form>

{{ result_html | safe }}

    <h2>{{ prediction_text }}</h2>
</div>

</body>
</html>
