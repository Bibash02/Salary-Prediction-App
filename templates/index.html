<!DOCTYPE html>
<html>
<head>
    <title>Salary Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 20px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Salary Prediction App</h1>

    <form action="/predict" method="POST">

        <input type="number" name="age" placeholder="Age" required>

        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="text" name="education" placeholder="Education Level (Bachelor's, Master's)" required>

        <input type="text" name="job" placeholder="Job Title (e.g. Data Analyst)" required>

        <input type="number" name="experience" placeholder="Years of Experience" required>

        <button type="submit">Predict Salary</button>
    </form>

    <h2>{{ prediction_text }}</h2>
</div>

</body>
</html>
